{% extends "base.html" %}

{% block title %}Immersion GM{% endblock %}

{% block content %}
<div class="gm-background" style="background-image: url('/static/assets/images/statues.jpg');"></div>
<main class="page gm-page">
  <header class="gm-header">
    <h1>Immersion GM</h1>
    <div class="gm-status-summary">
      <div class="status-item">
        <span class="label">Scene:</span>
        <span id="current-scene" class="value">None</span>
      </div>
      <div class="status-item">
        <span class="label">Music:</span>
        <span id="current-music" class="value">None</span>
      </div>
    </div>
    <button id="sync-state" class="sync-button" type="button">Sync Changes</button>
  </header>

  <div class="gm-grid">
    <section class="gm-section">
      <h2>Scenes</h2>
      <div id="scene-list" class="gm-control-group"></div>
    </section>

    <section class="gm-section">
      <h2>Music</h2>
      <div id="music-list" class="gm-control-group"></div>
    </section>

    <section class="gm-section">
      <h2>Ambiences</h2>
      <div id="ambience-list" class="gm-ambience-container"></div>
    </section>

    <section class="gm-section gm-settings">
      <h2>Fade Durations</h2>
      <div class="settings-grid">
        <div class="setting-item">
          <label for="fade-music">Music</label>
          <input id="fade-music" type="number" min="0" step="0.1" placeholder="5.0">
        </div>
        <div class="setting-item">
          <label for="fade-ambience">Ambience</label>
          <input id="fade-ambience" type="number" min="0" step="0.1" placeholder="10.0">
        </div>
        <div class="setting-item">
          <label for="fade-scene">Scene</label>
          <input id="fade-scene" type="number" min="0" step="0.1" placeholder="5.0">
        </div>
      </div>
    </section>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/gm.js"></script>
{% endblock %}
